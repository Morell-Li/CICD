name: QA API (OpenAPI)

on:
  workflow_dispatch:
  schedule:
    # UTC 时间；北京时间 10:00 执行。
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scheduled-selected-api:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        spec:
          - order-lifecycle-spot-limit.api.spec.ts
          - order-lifecycle-spot-market.api.spec.ts
          - order-lifecycle-linear-limit.api.spec.ts
          - order-lifecycle-linear-market.api.spec.ts
          - order-lifecycle-linear-tpsl.api.spec.ts
          - order-lifecycle-inverse-limit.api.spec.ts
          - order-lifecycle-inverse-market.api.spec.ts
          - order-lifecycle-inverse-tpsl.api.spec.ts
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --network-concurrency 3

      - name: Sync OpenAPI codegen
        run: pnpm openapi:sync

      - name: Install Playwright browsers (api project uses request only; minimal)
        run: pnpm exec playwright install chromium

      - name: Run scheduled API spec
        env:
          QA_ENV: testnet
          QA_API_KEY: ${{ secrets.ZOOMEX_TESTNET_API_KEY }}
          QA_API_SECRET: ${{ secrets.ZOOMEX_TESTNET_API_SECRET }}
          QA_API_POSITION_MODE: ${{ vars.QA_API_POSITION_MODE || 'oneway' }}
          QA_API_MARKET_ORDER_QTY: ${{ vars.QA_API_MARKET_ORDER_QTY || '' }}
          QA_API_ORDER_PRICE: ${{ vars.QA_API_ORDER_PRICE || '' }}
          QA_API_ORDER_AMEND_PRICE: ${{ vars.QA_API_ORDER_AMEND_PRICE || '' }}
        run: pnpm exec playwright test --config=qa-e2e/playwright.config.ts --project=api "qa-e2e/tests/api/${{ matrix.spec }}"
